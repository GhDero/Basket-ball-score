<uiView>
  <div>

    <div class="sp-title-bg" style="width:100%;height:15%;"></div>
    <div class="sp-title-text sp-t-m p-hc" style="top:3%;">Score</div>

    <div class="sp-t-s sp-c-orange p-hc" style="top:17%;">
      <eval input="Zapp/{zapp_index}/Output/indHome"
            outputFormat="keyValue 0=AWAY|1=HOME" default="HOME" />
    </div>

    <div class="cm-mid" style="top:25%;left:calc(50% - 1px);width:2px;height:33%;">|</div>

    <div class="f-s cm-mid" style="top:23%;left:2%;width:46%;max-height:34px;text-align:center;">HOME</div>
    <div class="f-s cm-mid" style="top:23%;left:52%;width:46%;max-height:34px;text-align:center;">AWAY</div>

    <div class="f-num sp-d-xxl" style="top:31%;left:2%;width:46%;text-align:center;">
      <eval input="Zapp/{zapp_index}/Output/homeScore"
            outputFormat="Count_Threedigits" default="0" />
    </div>
    <div class="f-num sp-d-xxl" style="top:31%;left:52%;width:46%;text-align:center;">
      <eval input="Zapp/{zapp_index}/Output/awayScore"
            outputFormat="Count_Threedigits" default="0" />
    </div>

    <!-- INDICATEURS descendus a 70% pour eviter superposition avec les scores -->
    <div class="sp-c-orange sp-t-l" style="top:70%;left:2%;width:46%;text-align:center;">
      <eval input="Zapp/{zapp_index}/Output/indHome"
            outputFormat="keyValue 0=&#x2009;|1=-" default="&#x2009;" />
    </div>
    <div class="sp-c-orange sp-t-l" style="top:70%;left:52%;width:46%;text-align:center;">
      <eval input="Zapp/{zapp_index}/Output/indAway"
            outputFormat="keyValue 0=&#x2009;|1=-" default="&#x2009;" />
    </div>

    <userInput>
      <pushButton name="up"
        onClick="$.put('/Zapp/{zapp_index}/Event', 1, null, 'int32');"
        onLongPressStart="$.put('/Zapp/{zapp_index}/Event', 3, null, 'int32');" />
      <pushButton name="down"
        onClick="$.put('/Zapp/{zapp_index}/Event', 2, null, 'int32');"
        onLongPressStart="$.put('/Zapp/{zapp_index}/Event', 4, null, 'int32');" />
    </userInput>

    <:if test="{{ IS_UI2 }}">
      <div style="top:17%;left:0%;width:100%;height:55%;"
           onTap="$.put('/Zapp/{zapp_index}/Event', 5, null, 'int32');">-</div>
    </:if>

  </div>
</uiView>
